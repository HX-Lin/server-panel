<!doctype html>
<html lang="zh-CN" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server Panel</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script>
    (function () {
      var saved = localStorage.getItem("server-panel-theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-bs-theme", saved);
      }
    })();
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-particles-interactive="true">
  <div class="panel-background" aria-hidden="true"></div>
  <div id="particles-js" class="panel-particles" aria-hidden="true"></div>
  <div class="panel-background-overlay" aria-hidden="true"></div>
  <div id="toastContainer" class="toast-stack"></div>

  <nav class="navbar navbar-dark bg-primary panel-navbar">
    <div class="container">
      <a class="navbar-brand" href="/">
        <svg class="me-2" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
          <defs>
            <radialGradient id="navBg1" cx="0.3" cy="0.3">
              <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#0277bd" stop-opacity="0.8"/>
            </radialGradient>
            <linearGradient id="navEcg1" x1="0%" x2="100%">
              <stop offset="0%" stop-color="#f08"/>
              <stop offset="50%" stop-color="#0f8"/>
              <stop offset="100%" stop-color="#80f"/>
            </linearGradient>
          </defs>
          <circle cx="16" cy="16" r="15" fill="url(#navBg1)" stroke="#0277bd" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="13" fill="none" stroke="#fff" stroke-width="1" opacity="0.4"/>
          <line x1="4" y1="16" x2="28" y2="16" stroke="#b3e5fc" stroke-width="0.5" opacity="0.8"/>
          <path id="navP1" d="M4 16L8 16L9 15L10 17L11 14L12 18L13 10L14 22L15 16L28 16" fill="none" stroke="url(#navEcg1)" stroke-width="2.8"/>
          <path d="M4 16L8 16L9 15L10 17L11 14L12 18L13 10L14 22L15 16L28 16" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
          <circle r="1.5" fill="#fff">
            <animateMotion dur="2s" repeatCount="indefinite">
              <mpath href="#navP1"/>
            </animateMotion>
          </circle>
          <circle cx="16" cy="16" r="8" fill="none" stroke="#f08" stroke-width="0.5" opacity="0.6">
            <animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
          </circle>
        </svg>
        服务器监控面板
      </a>
      <div class="d-flex align-items-center ms-auto">
        <a href="https://github.com/HX-Lin/server-panel" target="_blank" rel="noopener noreferrer" class="btn btn-outline-light btn-sm me-2" title="GitHub Repository">
          <i class="bi bi-github"></i>
        </a>
        <button id="themeToggler" class="btn btn-outline-light btn-sm me-2" type="button" title="切换主题">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <span id="sessionBadge" class="badge text-bg-light text-dark me-2 panel-session-badge">访客模式</span>
        <a id="adminAuthLink" class="nav-link text-light p-0" href="/login.html" style="white-space: nowrap;">管理员登录</a>
      </div>
    </div>
  </nav>

  <main class="container mt-4 panel-main-container">
    <div class="card shadow-sm panel-root-card">
      <div class="card-body">
        <div class="summary-banner mb-4">
          <div class="summary-chip summary-chip-server">
            <span class="summary-icon"><i class="bi bi-hdd-network"></i></span>
            <span class="summary-copy">
              <span class="summary-label">服务器</span>
              <strong id="summaryServers">-</strong>
            </span>
          </div>
          <div class="summary-chip summary-chip-online">
            <span class="summary-icon"><i class="bi bi-check2-circle"></i></span>
            <span class="summary-copy">
              <span class="summary-label">在线</span>
              <strong id="summaryOnline">-</strong>
            </span>
          </div>
          <div class="summary-chip summary-chip-gpu">
            <span class="summary-icon"><i class="bi bi-cpu"></i></span>
            <span class="summary-copy">
              <span class="summary-label">GPU</span>
              <strong id="summaryGpu">-</strong>
            </span>
          </div>
          <div class="summary-chip summary-chip-refresh">
            <span class="summary-icon"><i class="bi bi-arrow-repeat"></i></span>
            <span class="summary-copy">
              <span class="summary-label">刷新频率</span>
              <strong id="summaryRefresh">-</strong>
            </span>
          </div>
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
            <div>
              <h5 class="card-title mb-1">
                <i class="bi bi-server me-2"></i>服务器监控
              </h5>
              <div class="text-body-secondary small">GPU、显存、内存、CPU 与运行状态</div>
            </div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <span id="monitorModeBadge" class="badge text-bg-secondary panel-badge">访客只读</span>
              <span id="lastUpdated" class="badge text-bg-light border panel-badge">等待刷新</span>
              <button id="refreshBtn" class="btn btn-outline-secondary btn-sm" type="button" title="刷新">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </div>
          </div>

          <div id="monitorNotice" class="alert alert-info subtle-alert d-none mb-3"></div>

          <div class="table-responsive d-none d-lg-block">
            <table class="table table-striped table-hover align-middle monitor-table mb-0">
              <thead>
                <tr>
                  <th>节点</th>
                  <th>状态</th>
                  <th>CPU</th>
                  <th>内存</th>
                  <th>GPU</th>
                  <th>运行时长</th>
                  <th>最后更新</th>
                </tr>
              </thead>
              <tbody id="serverTableBody">
                <tr>
                  <td colspan="7" class="text-center py-5 text-body-secondary">加载中...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div id="mobileServerContainer" class="mobile-card-container d-lg-none">
            <div class="text-center p-3">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">加载中...</span>
              </div>
              <div class="mt-2">加载服务器数据中...</div>
            </div>
          </div>
        </div>

        <hr class="my-4">

        <div>
          <h5 class="card-title mb-3">
            <i class="bi bi-key me-2"></i>SSH Key 自助提交
          </h5>
          <div class="row g-4">
            <div class="col-lg-7">
              <div class="section-box h-100">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                  <div>
                    <div class="fw-semibold mb-1">Public key 上传</div>
                    <div class="text-body-secondary small">提交 OpenSSH public key 并走分发流程</div>
                  </div>
                  <span id="uploadModeBadge" class="badge text-bg-warning panel-badge">需要 token</span>
                </div>

                <form id="publicKeyForm" class="row g-3">
                  <div class="col-12">
                    <label class="form-label" for="publicKeyInput">Public key</label>
                    <textarea id="publicKeyInput" name="public_key" class="form-control code-input" rows="6" spellcheck="false" placeholder="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... user@host" required></textarea>
                  </div>
                  <div id="uploadTokenGroup" class="col-12">
                    <label class="form-label" for="uploadTokenInput">上传 token</label>
                    <input id="uploadTokenInput" name="upload_token" type="password" class="form-control" autocomplete="off" required>
                  </div>
                  <div class="col-12 d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary px-4">
                      <i class="bi bi-upload me-2"></i>提交 SSH Key
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <div class="col-lg-5">
              <div class="section-box h-100">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                  <div>
                    <div class="fw-semibold mb-1">执行结果</div>
                    <div class="text-body-secondary small">当前上传的指纹与分发状态</div>
                  </div>
                  <span id="keyFingerprint" class="badge text-bg-light border panel-badge">无</span>
                </div>

                <div id="keyResultEmpty" class="empty-state">
                  <i class="bi bi-inboxes"></i>
                  <div>还没有新的提交结果</div>
                </div>

                <div id="keyResultList" class="d-none"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="panel-footer footer fixed-bottom py-2 bg-light border-top">
    <div class="container text-center">
      <span class="text-muted small">服务器监控面板 &copy; 2026</span>
      <a href="https://github.com/HX-Lin/server-panel" target="_blank" rel="noopener noreferrer" class="ms-3 text-muted" title="GitHub Repository">
        <i class="bi bi-github"></i>
      </a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" crossorigin="anonymous"></script>
  <script src="/static/scene-effects.js"></script>
  <script src="/static/shared.js"></script>
  <script src="/static/main.js"></script>
</body>
</html>
