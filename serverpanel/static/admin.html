<!doctype html>
<html lang="zh-CN" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理后台</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script>
    (function () {
      var saved = localStorage.getItem("server-panel-theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-bs-theme", saved);
      }
    })();
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="toastContainer" class="toast-stack"></div>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary panel-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <span class="brand-mark"><i class="bi bi-activity"></i></span>
        <span>Server Panel</span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto flex-wrap justify-content-end">
        <span id="adminSessionBadge" class="badge text-bg-success panel-badge">管理员会话</span>
        <button id="refreshBtn" class="btn btn-outline-light btn-sm" type="button" title="刷新">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
        <button id="themeToggler" class="btn btn-outline-light btn-sm" type="button" title="切换主题">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <a class="btn btn-light btn-sm" href="/">返回首页</a>
        <button id="logoutBtn" class="btn btn-outline-light btn-sm" type="button">退出</button>
      </div>
    </div>
  </nav>

  <main class="container panel-shell">
    <div class="card shadow-sm panel-main-card">
      <div class="card-body">
        <section class="summary-strip summary-strip-admin mb-4">
          <div class="summary-tile">
            <div class="summary-label">服务器</div>
            <div id="summaryServers" class="summary-value">-</div>
          </div>
          <div class="summary-tile">
            <div class="summary-label">在线</div>
            <div id="summaryOnline" class="summary-value">-</div>
          </div>
          <div class="summary-tile">
            <div class="summary-label">GPU</div>
            <div id="summaryGpu" class="summary-value">-</div>
          </div>
          <div class="summary-tile">
            <div class="summary-label">刷新频率</div>
            <div id="summaryRefresh" class="summary-value">-</div>
          </div>
          <div class="summary-tile">
            <div class="summary-label">过期阈值</div>
            <div id="summaryStale" class="summary-value">-</div>
          </div>
          <div class="summary-tile">
            <div class="summary-label">Key 模式</div>
            <div id="summaryKeyMode" class="summary-value">-</div>
          </div>
        </section>

        <section class="panel-section">
          <div class="row g-4">
            <div class="col-xl-8">
              <div class="panel-subsection h-100">
                <div class="section-header">
                  <div>
                    <h2 class="section-title mb-1"><i class="bi bi-hdd-network me-2"></i>资源监控</h2>
                    <div class="section-subtitle">当前所有节点的实时资源与 GPU 负载</div>
                  </div>
                  <span id="lastUpdated" class="badge text-bg-light border panel-badge">等待刷新</span>
                </div>

                <div class="table-responsive d-none d-lg-block">
                  <table class="table table-striped table-hover align-middle monitor-table mb-0">
                    <thead>
                      <tr>
                        <th>节点</th>
                        <th>状态</th>
                        <th>CPU</th>
                        <th>内存</th>
                        <th>GPU</th>
                        <th>运行时长</th>
                        <th>最后更新</th>
                      </tr>
                    </thead>
                    <tbody id="serverTableBody">
                      <tr>
                        <td colspan="7" class="text-center py-5 text-body-secondary">加载中...</td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                <div id="mobileServerContainer" class="d-lg-none mobile-card-stack">
                  <div class="mobile-skeleton-card">
                    <div class="text-center text-body-secondary py-5">加载中...</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-xl-4">
              <div class="panel-subsection h-100">
                <div class="section-header">
                  <div>
                    <h2 class="section-title mb-1"><i class="bi bi-sliders2 me-2"></i>面板状态</h2>
                    <div class="section-subtitle">当前后端配置与采集模式</div>
                  </div>
                </div>

                <div id="settingsMeta" class="meta-list">
                  <div class="meta-row"><span>加载中...</span></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <hr class="section-divider">

        <section class="panel-section">
          <div class="row g-4">
            <div class="col-xl-7">
              <div class="panel-subsection h-100">
                <div class="section-header">
                  <div>
                    <h2 class="section-title mb-1"><i class="bi bi-key me-2"></i>SSH Key 分发</h2>
                    <div class="section-subtitle">管理员直接提交并分发 public key</div>
                  </div>
                  <span id="dryRunBadge" class="badge text-bg-warning panel-badge">dry_run</span>
                </div>

                <form id="adminKeyForm" class="row g-3">
                  <div class="col-12">
                    <label class="form-label" for="adminPublicKeyInput">Public key</label>
                    <textarea id="adminPublicKeyInput" name="public_key" class="form-control code-input" rows="8" spellcheck="false" placeholder="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... user@host" required></textarea>
                  </div>
                  <div class="col-12 d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary px-4">
                      <i class="bi bi-send-check me-2"></i>提交并分发
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <div class="col-xl-5">
              <div class="panel-subsection h-100">
                <div class="section-header">
                  <div>
                    <h2 class="section-title mb-1"><i class="bi bi-clipboard2-pulse me-2"></i>执行结果</h2>
                    <div class="section-subtitle">目标节点返回与分发耗时</div>
                  </div>
                  <span id="keyFingerprint" class="badge text-bg-light border panel-badge">无</span>
                </div>

                <div id="keyResultEmpty" class="empty-state">
                  <i class="bi bi-inboxes"></i>
                  <div>等待新的分发结果</div>
                </div>

                <div id="keyResultList" class="d-none"></div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="panel-footer">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
      <span class="text-body-secondary small">Server Panel Admin</span>
      <span class="text-body-secondary small">Frontend inspired by cf-vps-monitor</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="/static/shared.js"></script>
  <script src="/static/admin.js"></script>
</body>
</html>
