<!doctype html>
<html lang="zh-CN" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员登录</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script>
    (function () {
      var saved = localStorage.getItem("server-panel-theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-bs-theme", saved);
      }
    })();
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <div id="toastContainer" class="toast-stack"></div>

  <nav class="navbar navbar-dark bg-primary panel-navbar">
    <div class="container">
      <a class="navbar-brand" href="/">
        <svg class="me-2" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
          <defs>
            <radialGradient id="navBg2" cx="0.3" cy="0.3">
              <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#0277bd" stop-opacity="0.8"/>
            </radialGradient>
            <linearGradient id="navEcg2" x1="0%" x2="100%">
              <stop offset="0%" stop-color="#f08"/>
              <stop offset="50%" stop-color="#0f8"/>
              <stop offset="100%" stop-color="#80f"/>
            </linearGradient>
          </defs>
          <circle cx="16" cy="16" r="15" fill="url(#navBg2)" stroke="#0277bd" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="13" fill="none" stroke="#fff" stroke-width="1" opacity="0.4"/>
          <line x1="4" y1="16" x2="28" y2="16" stroke="#b3e5fc" stroke-width="0.5" opacity="0.8"/>
          <path id="navP2" d="M4 16L8 16L9 15L10 17L11 14L12 18L13 10L14 22L15 16L28 16" fill="none" stroke="url(#navEcg2)" stroke-width="2.8"/>
          <path d="M4 16L8 16L9 15L10 17L11 14L12 18L13 10L14 22L15 16L28 16" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
          <circle r="1.5" fill="#fff">
            <animateMotion dur="2s" repeatCount="indefinite">
              <mpath href="#navP2"/>
            </animateMotion>
          </circle>
          <circle cx="16" cy="16" r="8" fill="none" stroke="#f08" stroke-width="0.5" opacity="0.6">
            <animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
          </circle>
        </svg>
        服务器监控面板
      </a>
      <div class="d-flex align-items-center ms-auto">
        <button id="themeToggler" class="btn btn-outline-light btn-sm me-2" type="button" title="切换主题">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <a class="nav-link text-light p-0" href="/" style="white-space: nowrap;">返回首页</a>
      </div>
    </div>
  </nav>

  <main class="container mt-5 login-main-container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm login-card">
          <div class="card-header">
            <h4 class="card-title mb-0">管理员登录</h4>
          </div>
          <div class="card-body login-card-body">
            <div class="login-mark mb-3">
              <i class="bi bi-shield-lock"></i>
            </div>
            <p class="text-body-secondary mb-4">进入监控后台与 SSH Key 分发控制台</p>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label" for="passwordInput">管理员口令</label>
                <input id="passwordInput" type="password" class="form-control" autocomplete="current-password" required>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  登录
                </button>
              </div>
            </form>
          </div>
          <div class="card-footer text-muted">
            <small>使用管理员口令登录此面板</small>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="panel-footer footer fixed-bottom py-2 bg-light border-top">
    <div class="container text-center">
      <span class="text-muted small">服务器监控面板 &copy; 2026</span>
      <a href="https://github.com/HX-Lin/server-panel" target="_blank" rel="noopener noreferrer" class="ms-3 text-muted" title="GitHub Repository">
        <i class="bi bi-github"></i>
      </a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="/static/shared.js"></script>
  <script src="/static/login.js"></script>
</body>
</html>
