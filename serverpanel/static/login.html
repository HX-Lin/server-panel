<!doctype html>
<html lang="zh-CN" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员登录</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script>
    (function () {
      var saved = localStorage.getItem("server-panel-theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-bs-theme", saved);
      }
    })();
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <div id="toastContainer" class="toast-stack"></div>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary panel-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <span class="brand-mark"><i class="bi bi-activity"></i></span>
        <span>Server Panel</span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <button id="themeToggler" class="btn btn-outline-light btn-sm" type="button" title="切换主题">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <a class="btn btn-light btn-sm" href="/">返回首页</a>
      </div>
    </div>
  </nav>

  <main class="container login-shell">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5 col-xl-4">
        <div class="card shadow-sm login-card">
          <div class="card-body p-4 p-lg-4">
            <div class="text-center mb-4">
              <span class="brand-mark brand-mark-lg mb-3"><i class="bi bi-shield-lock"></i></span>
              <h1 class="h4 mb-2">管理员登录</h1>
              <p class="text-body-secondary mb-0">进入监控后台与 SSH Key 分发控制台</p>
            </div>

            <form id="loginForm" class="row g-3">
              <div class="col-12">
                <label class="form-label" for="passwordInput">管理员口令</label>
                <input id="passwordInput" type="password" class="form-control form-control-lg" autocomplete="current-password" required>
              </div>
              <div class="col-12 d-grid mt-2">
                <button type="submit" class="btn btn-primary btn-lg">
                  <i class="bi bi-box-arrow-in-right me-2"></i>登录
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="panel-footer">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
      <span class="text-body-secondary small">Server Panel Login</span>
      <span class="text-body-secondary small">Frontend inspired by cf-vps-monitor</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="/static/shared.js"></script>
  <script src="/static/login.js"></script>
</body>
</html>
